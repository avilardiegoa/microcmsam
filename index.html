<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor visual para sitios web | AMTECH</title>
  <meta name="description" content="Demostración visual de un editor para sitios web. La versión final se adapta a cada proyecto.">
  <style>
    :root{
      --bg:#0f172a;
      --bg2:#020617;
      --card:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.12);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --primary:#6366f1;
      --secondary:#ec4899;
      --ok:#10b981;
      --grad:linear-gradient(135deg,var(--primary),var(--secondary));
      --shadow:0 18px 40px rgba(0,0,0,.25);
      --radius:24px;
      --max:1100px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 10% 10%, rgba(99,102,241,.18), transparent 60%),
        radial-gradient(900px 500px at 90% 10%, rgba(236,72,153,.14), transparent 60%),
        linear-gradient(180deg,var(--bg),var(--bg2));
    }

    a{text-decoration:none;color:inherit}
    img{display:block;max-width:100%}
    .container{width:min(92%,var(--max));margin:auto}

    nav{
      position:sticky;top:0;z-index:20;
      background:rgba(15,23,42,.82);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .nav{
      min-height:78px;
      display:flex;align-items:center;justify-content:space-between;gap:16px;
    }

    .brand{
      display:flex;align-items:center;gap:10px;font-weight:900;font-size:1.2rem;
    }

    .dot{
      width:14px;height:14px;border-radius:50%;
      background:var(--grad);
      box-shadow:0 0 0 6px rgba(99,102,241,.12);
    }

    .brand span:last-child{
      background:var(--grad);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .actions{display:flex;gap:10px;flex-wrap:wrap}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:13px 18px;border-radius:999px;font-weight:800;
      border:1px solid var(--line);transition:.2s ease;cursor:pointer;
    }

    .btn:hover{transform:translateY(-2px)}
    .btn-primary{background:var(--grad);border-color:transparent}
    .btn-soft{background:rgba(255,255,255,.05)}
    .btn-ok{background:rgba(16,185,129,.16);border-color:rgba(16,185,129,.25);color:#d1fae5}

    .hero{padding:70px 0 40px}
    .hero-grid{
      display:grid;grid-template-columns:1.05fr .95fr;gap:28px;align-items:center;
    }

    .badges{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
    .badge{
      padding:9px 12px;border-radius:999px;
      border:1px solid var(--line);background:rgba(255,255,255,.05);
      font-size:.9rem;font-weight:800;color:#e2e8f0;
    }

    h1{
      margin:0 0 16px;
      font-size:clamp(2.2rem,5vw,4rem);
      line-height:1.05;letter-spacing:-.04em;
    }

    .accent{
      background:var(--grad);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .lead{
      margin:0 0 22px;
      color:var(--muted);
      font-size:1.08rem;
      max-width:58ch;
      line-height:1.6;
    }

    .hero-actions{display:flex;gap:12px;flex-wrap:wrap}

    .card{
      border:1px solid var(--line);
      background:var(--card);
      border-radius:30px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .card-body{padding:22px}
    .card h3{margin:0 0 12px}
    .list{list-style:none;padding:0;margin:0;display:grid;gap:10px}
    .list li{
      padding:12px 14px;border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      font-weight:700;color:#e2e8f0;
    }

    .hero-img img{
      width:100%;aspect-ratio:16/10;object-fit:cover;
      border-top:1px solid rgba(255,255,255,.08);
    }

    .note-wrap{padding:0 0 34px}
    .note{
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      border-radius:22px;
      padding:18px 20px;
      color:#e2e8f0;
    }

    .note h3{margin:0 0 8px;font-size:1rem}
    .note p{margin:0;color:var(--muted);line-height:1.6}

    section{padding:72px 0}
    .head{text-align:center;margin-bottom:32px}
    .head h2{
      margin:0 0 12px;
      font-size:clamp(1.9rem,4vw,2.8rem);
      letter-spacing:-.04em;
    }

    .head p{
      margin:0 auto;max-width:70ch;color:var(--muted);line-height:1.6;font-size:1.04rem
    }

    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .item{
      border:1px solid var(--line);
      background:var(--card);
      border-radius:24px;
      padding:22px;
      box-shadow:0 12px 26px rgba(0,0,0,.14);
    }

    .icon{
      width:48px;height:48px;border-radius:16px;
      display:grid;place-items:center;font-size:1.3rem;
      margin-bottom:14px;background:rgba(255,255,255,.05);border:1px solid var(--line);
    }

    .item h3{margin:0 0 10px;font-size:1.08rem}
    .item p{margin:0;color:var(--muted);line-height:1.6}

    .cta{
      padding:74px 0;
      background:linear-gradient(135deg, rgba(99,102,241,.95), rgba(236,72,153,.92));
      border-radius:40px 40px 0 0;
    }

    .cta-box{text-align:center}
    .cta-box h2{
      margin:0 0 12px;
      font-size:clamp(1.9rem,4vw,2.8rem);
      letter-spacing:-.04em;
    }

    .cta-box p{
      margin:0 auto 20px;
      max-width:65ch;
      font-size:1.05rem;
      line-height:1.6;
      opacity:.95;
      font-weight:600;
    }

    footer{
      background:#050811;
      border-top:1px solid rgba(255,255,255,.08);
      padding:24px 0 34px;
      text-align:center;
      color:#94a3b8;
      font-weight:700;
    }

    .mini-badges{
      display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
      margin-bottom:12px;
    }

    .mini-badge{
      padding:8px 12px;border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#e2e8f0;
      font-weight:900;
    }

    @media (max-width:900px){
      .hero-grid,.grid{grid-template-columns:1fr}
    }

    @media (max-width:700px){
      .actions{display:none}
      .hero-actions{display:grid}
      .hero-actions .btn{width:100%}
      .hero{padding:56px 0 28px}
      section{padding:60px 0}
    }
  </style>
</head>
<body>
  <nav>
    <div class="container nav">
      <a class="brand" href="#inicio">
        <span class="dot"></span>
        <span>AMTECH Demo</span>
      </a>

      <div class="actions">
        <a class="btn btn-ok" href="editor.html">Abrir editor visual</a>
        <a class="btn btn-soft" href="https://avilardiegoa.github.io/amtech/" target="_blank" rel="noopener">Volver a AMTECH</a>
      </div>
    </div>
  </nav>

  <main>
    <header class="hero" id="inicio">
      <div class="container hero-grid">
        <div>
          <div class="badges">
            <span class="badge" data-text="b1"></span>
            <span class="badge" data-text="b2"></span>
            <span class="badge" data-text="b3"></span>
          </div>

          <h1 data-html="title"></h1>
          <p class="lead" data-text="lead"></p>

          <div class="hero-actions">
            <a class="btn btn-primary" href="#funciones" data-text="btn1"></a>
            <a class="btn btn-soft" href="editor.html" data-text="btn2"></a>
          </div>
        </div>

        <div class="card">
          <div class="card-body">
            <h3 data-text="cardTitle"></h3>
            <ul class="list">
              <li data-text="li1"></li>
              <li data-text="li2"></li>
              <li data-text="li3"></li>
              <li data-text="li4"></li>
            </ul>
          </div>
          <div class="hero-img">
            <img data-image="heroImage" alt="Demo visual del editor">
          </div>
        </div>
      </div>
    </header>

    <section class="note-wrap">
      <div class="container">
        <div class="note">
          <h3>Importante</h3>
          <p data-text="note"></p>
        </div>
      </div>
    </section>

    <section id="funciones">
      <div class="container">
        <div class="head">
          <h2 data-text="servicesTitle"></h2>
          <p data-text="servicesLead"></p>
        </div>

        <div class="grid">
          <article class="item">
            <div class="icon">✍️</div>
            <h3 data-text="s1t"></h3>
            <p data-text="s1d"></p>
          </article>

          <article class="item">
            <div class="icon">🖼️</div>
            <h3 data-text="s2t"></h3>
            <p data-text="s2d"></p>
          </article>

          <article class="item">
            <div class="icon">⚙️</div>
            <h3 data-text="s3t"></h3>
            <p data-text="s3d"></p>
          </article>
        </div>
      </div>
    </section>

    <section class="cta">
      <div class="container cta-box">
        <h2 data-text="ctaTitle"></h2>
        <p data-text="ctaText"></p>

        <div class="hero-actions" style="justify-content:center">
          <a class="btn btn-soft" href="editor.html">Probar editor</a>
          <a class="btn btn-primary" href="https://avilardiegoa.github.io/amtech/" target="_blank" rel="noopener">Ir a AMTECH</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="mini-badges">
        <span class="mini-badge">© 2026 AMTECH</span>
        <span class="mini-badge">Demo visual</span>
      </div>
      <div data-text="footer"></div>
    </div>
  </footer>

  <script>
    const KEY = "amtech-microcms-demo-v2";

    const dataDefault = {
      b1: "Fácil de usar",
      b2: "Diseño protegido",
      b3: "Ajustado a tu web",

      title: 'Edita tu sitio sin tocar código y sin dañar el diseño.',
      lead: 'Esta es una demostración visual de cómo puede funcionar tu panel de edición. Cada sitio se adapta según su estructura, su contenido y la forma en que necesitas administrarlo.',

      btn1: "Ver funciones",
      btn2: "Probar editor visual",

      cardTitle: "¿Qué muestra esta demo?",
      li1: "Cómo se vería tu web con edición visual",
      li2: "Cómo podrías cambiar contenido sin tocar código",
      li3: "Qué tan simple puede ser administrar tu sitio",
      li4: "Una base cercana al producto final, no una copia exacta",

      heroImage: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=1600&q=75&fm=webp",

      note: "Esta demostración muestra la idea general del editor visual. El panel final no tiene que verse exactamente así: cada sitio puede tener una forma de edición distinta, según su diseño, sus secciones y lo que realmente necesite administrar.",

      servicesTitle: "¿Qué se puede administrar?",
      servicesLead: "Cada proyecto se configura según lo que realmente necesitas. No todos los sitios requieren el mismo tipo de panel.",

      s1t: "Textos y botones",
      s1d: "Cambia títulos, párrafos, llamadas a la acción y datos clave de forma rápida.",

      s2t: "Imágenes y bloques",
      s2d: "Actualiza imágenes, banners o secciones sin entrar al código del sitio.",

      s3t: "Edición a medida",
      s3d: "El panel final se diseña según tu web. Puede ser más simple o más completo.",

      ctaTitle: "Tu editor puede verse distinto a esta demo",
      ctaText: "Esta muestra sirve para entender la idea. El resultado final se construye según tu sitio, tus secciones y la forma en que deseas administrarlo.",

      footer: "Demo comercial de edición visual para sitios web. La versión final se adapta a cada proyecto."
    };

    function getData(){
      try{
        return {...dataDefault, ...(JSON.parse(localStorage.getItem(KEY)) || {})};
      }catch(e){
        return {...dataDefault};
      }
    }

    function paint(){
      const d = getData();

      document.querySelectorAll("[data-text]").forEach(el=>{
        const k = el.dataset.text;
        el.textContent = d[k] || "";
      });

      document.querySelectorAll("[data-html]").forEach(el=>{
        const k = el.dataset.html;
        el.innerHTML = d[k] || "";
      });

      document.querySelectorAll("[data-image]").forEach(el=>{
        const k = el.dataset.image;
        el.src = d[k] || "";
      });
    }

    paint();
    window.addEventListener("storage", paint);
  </script>
</body>
</html>
